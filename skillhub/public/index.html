<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="description" content="Discover and book hands-on workshops designed for students. Learn UI/UX, Web Development, Machine Learning, and more from industry experts." />

    <!-- Twitter Card -->

    <meta property="twitter:url" content="https://skillhub.example.com/" />

    <meta property="twitter:image" content="https://skillhub.example.com/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://skillhub.example.com/" />

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%236C63FF'>S</text></svg>" />

      rel="stylesheet"
    />

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Manrope:wght@400;500&display=swap" as="style" />
